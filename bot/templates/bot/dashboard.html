<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp AI Bot Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-header {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-header:hover {
            background: white;
            color: #667eea;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-indicator.connected {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .status-indicator.loading {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 1rem;
            color: #666;
            margin-top: 10px;
        }

        .status-text.success {
            color: #10b981;
            font-weight: 600;
        }

        .send-message-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .conversations-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background 0.2s;
        }

        .conversation-item:hover {
            background: #f9fafb;
        }

        .conversation-item:last-child {
            border-bottom: none;
        }

        .conversation-phone {
            font-weight: 600;
            color: #374151;
            margin-bottom: 5px;
        }

        .conversation-preview {
            color: #6b7280;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-time {
            color: #9ca3af;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 WhatsApp AI Bot</h1>
            <div class="header-actions">
                <a href="/contacts/" class="btn-header">📱 Contacts</a>
                <a href="/" class="btn-header">⚙️ Setup</a>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Connection Status Card -->
            <div class="card">
                <h2>
                    <span class="status-indicator loading" id="statusIndicator"></span>
                    Connection Status
                </h2>
                <div id="connectionStatus">
                    <div class="loading">Checking connection...</div>
                </div>
            </div>

            <!-- Send Message Card -->
            <div class="card">
                <h2>📤 Send Message</h2>
                <form class="send-message-form" id="sendMessageForm">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number (with country code)</label>
                        <input
                            type="text"
                            id="phoneNumber"
                            placeholder="e.g., 1234567890"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="messageText">Message</label>
                        <textarea
                            id="messageText"
                            placeholder="Type your message here..."
                            required
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="sendBtn">
                        Send Message
                    </button>
                    <div id="sendAlert"></div>
                </form>
            </div>
        </div>

        <!-- Recent Conversations -->
        <div class="card">
            <h2>💬 Recent Conversations</h2>
            <div id="conversationsList">
                <div class="loading">Loading conversations...</div>
            </div>
        </div>
    </div>

    <script>
        let statusCheckInterval;

        // Check WhatsApp connection status
        async function checkStatus() {
            try {
                const response = await fetch('/api/status/');
                const data = await response.json();

                const statusIndicator = document.getElementById('statusIndicator');
                const connectionStatus = document.getElementById('connectionStatus');

                if (data.ready) {
                    statusIndicator.className = 'status-indicator connected';
                    connectionStatus.innerHTML = `
                        <p class="status-text success">✓ WhatsApp Connected</p>
                        <p class="status-text">Bot is ready to receive and send messages</p>
                    `;
                } else {
                    statusIndicator.className = 'status-indicator disconnected';
                    connectionStatus.innerHTML = `
                        <p class="status-text">⚠ WhatsApp Disconnected</p>
                        <p class="status-text">Please complete setup to connect WhatsApp</p>
                        <a href="/" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Go to Setup</a>
                    `;
                }
            } catch (error) {
                const statusIndicator = document.getElementById('statusIndicator');
                const connectionStatus = document.getElementById('connectionStatus');

                statusIndicator.className = 'status-indicator disconnected';
                connectionStatus.innerHTML = `
                    <p class="status-text">❌ Service Unavailable</p>
                    <p class="status-text">Make sure the WhatsApp service is running</p>
                `;
            }
        }

        // Send message
        document.getElementById('sendMessageForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const phoneNumber = document.getElementById('phoneNumber').value;
            const messageText = document.getElementById('messageText').value;
            const sendBtn = document.getElementById('sendBtn');
            const sendAlert = document.getElementById('sendAlert');

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            sendAlert.innerHTML = '';

            try {
                const response = await fetch('http://localhost:3000/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        number: phoneNumber,
                        message: messageText
                    })
                });

                if (response.ok) {
                    sendAlert.innerHTML = '<div class="alert alert-success">✓ Message sent successfully!</div>';
                    document.getElementById('messageText').value = '';
                    loadConversations();
                } else {
                    const error = await response.json();
                    sendAlert.innerHTML = `<div class="alert alert-error">❌ Error: ${error.error}</div>`;
                }
            } catch (error) {
                sendAlert.innerHTML = `<div class="alert alert-error">❌ Failed to send message: ${error.message}</div>`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Message';
            }
        });

        // Load recent conversations
        async function loadConversations() {
            const conversationsList = document.getElementById('conversationsList');

            try {
                const response = await fetch('/api/conversations/');
                const conversations = await response.json();

                if (conversations.length === 0) {
                    conversationsList.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                            </svg>
                            <p>No conversations yet</p>
                            <p style="font-size: 0.9rem; margin-top: 10px;">Messages will appear here once you start chatting</p>
                        </div>
                    `;
                    return;
                }

                conversationsList.innerHTML = '<div class="conversations-list"></div>';
                const listContainer = conversationsList.querySelector('.conversations-list');

                conversations.forEach(conv => {
                    const timeAgo = getTimeAgo(new Date(conv.timestamp));
                    const conversationItem = document.createElement('div');
                    conversationItem.className = 'conversation-item';
                    conversationItem.innerHTML = `
                        <div class="conversation-phone">${conv.phone_number}</div>
                        <div class="conversation-preview">${conv.last_message || 'No messages'}</div>
                        <div class="conversation-time">${timeAgo} • ${conv.message_count} messages</div>
                    `;
                    listContainer.appendChild(conversationItem);
                });
            } catch (error) {
                conversationsList.innerHTML = `
                    <div class="empty-state">
                        <p>Failed to load conversations</p>
                    </div>
                `;
            }
        }

        // Helper function to format time
        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);

            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
            return date.toLocaleDateString();
        }

        // Initialize
        checkStatus();
        loadConversations();
        statusCheckInterval = setInterval(checkStatus, 5000);
    </script>
</body>
</html>
