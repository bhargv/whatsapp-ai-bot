<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Contacts - AI Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-header {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-header:hover {
            background: white;
            color: #667eea;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .contact-card {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .contact-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .contact-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            color: #374151;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .contact-number {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .contact-status {
            display: inline-block;
            padding: 4px 10px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-box {
            flex: 1;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .auto-reply-badge {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📱 WhatsApp Contacts</h1>
                <span class="auto-reply-badge">✓ Auto-Reply Active</span>
            </div>
            <div class="header-actions">
                <a href="/" class="btn-header">⚙️ Setup</a>
                <a href="/dashboard/" class="btn-header">📊 Dashboard</a>
            </div>
        </div>

        <div class="card">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalContacts">0</div>
                    <div class="stat-label">Total Contacts</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalChats">0</div>
                    <div class="stat-label">Active Chats</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalConversations">0</div>
                    <div class="stat-label">AI Conversations</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('contacts')">All Contacts</button>
                <button class="tab" onclick="switchTab('chats')">Recent Chats</button>
            </div>

            <input
                type="text"
                class="search-box"
                id="searchBox"
                placeholder="🔍 Search contacts by name or number..."
                oninput="filterContacts()"
            >

            <div id="contactsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading contacts...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allContacts = [];
        let allChats = [];
        let currentTab = 'contacts';

        async function loadContacts() {
            try {
                const response = await fetch('/api/contacts/');
                const data = await response.json();

                allContacts = data.contacts || [];
                document.getElementById('totalContacts').textContent = allContacts.length;

                if (currentTab === 'contacts') {
                    displayContacts(allContacts);
                }
            } catch (error) {
                document.getElementById('contactsContainer').innerHTML = `
                    <div class="empty-state">
                        <p>❌ Failed to load contacts</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        async function loadChats() {
            try {
                const response = await fetch('/api/chats/');
                const data = await response.json();

                allChats = data.chats || [];
                document.getElementById('totalChats').textContent = allChats.length;

                if (currentTab === 'chats') {
                    displayChats(allChats);
                }
            } catch (error) {
                document.getElementById('contactsContainer').innerHTML = `
                    <div class="empty-state">
                        <p>❌ Failed to load chats</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations/');
                const conversations = await response.json();
                document.getElementById('totalConversations').textContent = conversations.length;
            } catch (error) {
                console.error('Failed to load conversations:', error);
            }
        }

        function displayContacts(contacts) {
            const container = document.getElementById('contactsContainer');

            if (contacts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <p>No contacts found</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Make sure WhatsApp is connected</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="contacts-grid"></div>';
            const grid = container.querySelector('.contacts-grid');

            contacts.forEach(contact => {
                const initial = (contact.name || contact.number || '?')[0].toUpperCase();
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.onclick = () => selectContact(contact);
                card.innerHTML = `
                    <div class="contact-header">
                        <div class="contact-avatar">${initial}</div>
                        <div class="contact-info">
                            <div class="contact-name">${contact.name || 'Unknown'}</div>
                            <div class="contact-number">${contact.number || contact.id}</div>
                        </div>
                    </div>
                    <div class="contact-status">Auto-Reply Enabled</div>
                `;
                grid.appendChild(card);
            });
        }

        function displayChats(chats) {
            const container = document.getElementById('contactsContainer');

            if (chats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                        <p>No recent chats</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Start a conversation to see it here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="contacts-grid"></div>';
            const grid = container.querySelector('.contacts-grid');

            chats.forEach(chat => {
                const initial = (chat.name || '?')[0].toUpperCase();
                const lastMsg = chat.lastMessage ? chat.lastMessage.body.substring(0, 50) : 'No messages';
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.onclick = () => selectContact(chat);
                card.innerHTML = `
                    <div class="contact-header">
                        <div class="contact-avatar">${initial}</div>
                        <div class="contact-info">
                            <div class="contact-name">${chat.name || 'Unknown'}</div>
                            <div class="contact-number">${lastMsg}...</div>
                        </div>
                    </div>
                    ${chat.unreadCount > 0 ? `<div class="contact-status">${chat.unreadCount} unread</div>` : '<div class="contact-status">Auto-Reply Enabled</div>'}
                `;
                grid.appendChild(card);
            });
        }

        function switchTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('searchBox').value = '';

            if (tab === 'contacts') {
                displayContacts(allContacts);
            } else {
                displayChats(allChats);
            }
        }

        function filterContacts() {
            const search = document.getElementById('searchBox').value.toLowerCase();

            if (currentTab === 'contacts') {
                const filtered = allContacts.filter(c =>
                    (c.name || '').toLowerCase().includes(search) ||
                    (c.number || '').includes(search)
                );
                displayContacts(filtered);
            } else {
                const filtered = allChats.filter(c =>
                    (c.name || '').toLowerCase().includes(search)
                );
                displayChats(filtered);
            }
        }

        function selectContact(contact) {
            const number = contact.number || contact.id.replace('@c.us', '');
            window.location.href = `/dashboard/?contact=${number}`;
        }

        // Initialize
        loadContacts();
        loadChats();
        loadConversations();

        // Refresh every 10 seconds
        setInterval(() => {
            loadContacts();
            loadChats();
            loadConversations();
        }, 10000);
    </script>
</body>
</html>
